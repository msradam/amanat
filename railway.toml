[build]
builder = "nixpacks"
buildCommand = "curl -LsSf https://astral.sh/uv/install.sh | sh && export PATH=$HOME/.local/bin:$PATH && uv sync --no-dev"

[deploy]
startCommand = "export PATH=$HOME/.local/bin:$PATH && uv run chainlit run app.py --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
